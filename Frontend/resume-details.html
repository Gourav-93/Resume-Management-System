<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Details - Premium Resume Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="dashboard.html" class="logo">
                <i class="fa-solid fa-file-contract"></i> ResumePro
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="resumes.html" class="nav-link">All Resumes</a>
                <a href="upload.html" class="nav-link">Upload</a>
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn btn-secondary" id="logoutBtn" style="padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container animate-fade-in-up">
        <div style="margin-bottom: var(--spacing-lg);">
            <a href="resumes.html" style="color: var(--text-secondary); text-decoration: none; display: inline-flex; align-items: center; gap: var(--spacing-xs);">
                <i class="fa-solid fa-arrow-left"></i> Back to Resumes
            </a>
        </div>

        <div class="bento-grid" style="grid-template-columns: 1fr 2fr;">
            <!-- Sidebar: Candidate Info -->
            <div class="glass-card flex-col gap-md" id="candidateInfoCard">
                <div class="skeleton" style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto;"></div>
                <div class="skeleton" style="height: 24px; width: 80%; margin: 0 auto;"></div>
                <div class="skeleton" style="height: 16px; width: 60%; margin: 0 auto;"></div>
            </div>

            <!-- Main Panel: Resume Actions & Preview -->
            <div class="glass-card flex-col gap-lg">
                <div class="flex justify-between items-center" style="border-bottom: 1px solid var(--border-color); padding-bottom: var(--spacing-md);">
                    <h2 style="font-size: 1.5rem;">Resume Document</h2>
                    <div class="flex gap-sm" id="actionButtons" style="display: none;">
                        <button id="downloadBtn" class="btn btn-primary">
                            <i class="fa-solid fa-download"></i> Download
                        </button>
                        <button id="deleteBtn" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
                
                <div id="pdfPreviewContainer" style="width: 100%; height: 600px; background: rgba(0,0,0,0.2); border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center;">
                    <div class="skeleton" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Elements -->
    <div class="loader-overlay" id="globalLoader">
        <div class="spinner"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/resume-details.js"></script>
</body>
</html>
