<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - Premium Resume Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="dashboard.html" class="logo">
                <i class="fa-solid fa-file-contract"></i> ResumePro
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="resumes.html" class="nav-link">All Resumes</a>
                <a href="upload.html" class="nav-link active">Upload</a>
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn btn-secondary" id="logoutBtn" style="padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container animate-fade-in-up">
        <div style="max-width: 800px; margin: 0 auto;">
            <div style="margin-bottom: var(--spacing-xl); text-align: center;">
                <h1 style="font-size: 2.5rem; margin-bottom: var(--spacing-sm);">Upload Resume</h1>
                <p style="color: var(--text-secondary);">Add a new candidate's resume to your database.</p>
            </div>

            <div class="glass-card">
                <form id="uploadForm">
                    <div class="bento-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: var(--spacing-lg);">
                        <div class="form-group">
                            <label class="form-label" for="name">Candidate Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Jane Smith" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">Phone Number</label>
                            <input type="tel" id="phone" class="form-control" placeholder="+1 (555) 123-4567" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: var(--spacing-lg);">
                        <label class="form-label" for="skills">Skills (Comma separated)</label>
                        <input type="text" id="skills" class="form-control" placeholder="JavaScript, React, Node.js" required>
                    </div>

                    <div class="form-group" style="margin-bottom: var(--spacing-xl);">
                        <label class="form-label">Resume File (PDF)</label>
                        <div class="file-drop-area" id="dropArea">
                            <input type="file" id="file" accept="application/pdf" required>
                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                            <h3 style="margin-bottom: var(--spacing-xs);">Drag & Drop your PDF here</h3>
                            <p style="color: var(--text-secondary); font-size: 0.875rem;">or click to browse from your computer</p>
                            
                            <div id="filePreview" style="display: none; margin-top: var(--spacing-md); padding: var(--spacing-sm); background: var(--surface-color); border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                                <div class="flex items-center justify-center gap-sm">
                                    <i class="fa-solid fa-file-pdf" style="color: #ef4444; font-size: 1.5rem;"></i>
                                    <span id="fileNameDisplay" style="font-weight: 500;">filename.pdf</span>
                                    <span id="fileSizeDisplay" style="color: var(--text-secondary); font-size: 0.875rem;">(2.5 MB)</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-md">
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <span>Upload Resume</span>
                            <i class="fa-solid fa-check"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Global Elements -->
    <div class="loader-overlay" id="globalLoader">
        <div class="spinner"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
